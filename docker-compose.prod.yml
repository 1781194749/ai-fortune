name: ai-fortune-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: "${POSTGRES_DB:-xuanji_ai}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  ai-fortune:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: ai-fortune:prod
    container_name: ai-fortune
    restart: unless-stopped
    env_file:
      - .env.production.local
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      NEXT_TELEMETRY_DISABLED: "1"
      REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:${AI_FORTUNE_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ai-fortune-tools:
    profiles:
      - tools
    build:
      context: .
      dockerfile: Dockerfile
      target: tools
    image: ai-fortune:tools
    env_file:
      - .env.production.local
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      REDIS_URL: redis://redis:6379
    command: ["npm", "run", "launch:preflight"]

  deep-report-worker:
    image: ai-fortune:prod
    restart: unless-stopped
    env_file:
      - .env.production.local
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-fortune:
        condition: service_healthy
    command: ["node", "dist-workers/deep-report-worker.mjs"]

  membership-lifecycle-worker:
    image: ai-fortune:prod
    restart: unless-stopped
    env_file:
      - .env.production.local
    environment:
      NODE_ENV: production
      MEMBERSHIP_RECONCILE_URL: http://ai-fortune:3000/api/internal/memberships/reconcile
      MEMBERSHIP_RECONCILE_INTERVAL_MS: "300000"
    depends_on:
      ai-fortune:
        condition: service_healthy
    command: ["node", "scripts/membership-reconcile-worker.mjs"]

volumes:
  postgres_data:
  redis_data:
